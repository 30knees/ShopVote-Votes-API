services:
  _defaults:
    public: true
    autowire: true
    autoconfigure: true

  # API Client
  shopvote.api.client:
    class: ShopVote\ShopVoteReviews\Api\ShopVoteApiClient
    arguments:
      - '@?prestashop.adapter.legacy.logger'

  # XML Parser
  shopvote.api.xml_parser:
    class: ShopVote\ShopVoteReviews\Api\XmlParser

  # Repositories
  shopvote.repository.shop_summary:
    class: ShopVote\ShopVoteReviews\Repository\ShopSummaryRepository

  shopvote.repository.review:
    class: ShopVote\ShopVoteReviews\Repository\ReviewRepository

  shopvote.repository.sync_log:
    class: ShopVote\ShopVoteReviews\Repository\SyncLogRepository

  shopvote.repository.sync_lock:
    class: ShopVote\ShopVoteReviews\Repository\SyncLockRepository

  # Sync Service
  shopvote.service.sync:
    class: ShopVote\ShopVoteReviews\Service\SyncService
    arguments:
      - '@shopvote.api.client'
      - '@shopvote.api.xml_parser'
      - '@shopvote.repository.shop_summary'
      - '@shopvote.repository.review'
      - '@shopvote.repository.sync_log'
      - '@shopvote.repository.sync_lock'

  # Configuration Service
  shopvote.service.configuration:
    class: ShopVote\ShopVoteReviews\Service\ConfigurationService
